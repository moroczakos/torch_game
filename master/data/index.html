<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>Torch Control Panel</title>
		<link rel="stylesheet" href="style.css">
    </head>
    <body>
	
        <!-- SIDEBAR -->
		
        <div id="sidebar">
            <h2>🔥 Torch Panel</h2>
            <button class="menuBtn" onclick="showMenu('dashboard')">Dashboard</button>
            <button class="menuBtn" onclick="showMenu('testing')">Testing</button>
			<button class="menuBtn" onclick="showMenu('status')">Status</button>
        </div>
		
        <!-- MAIN -->
		
        <div id="main">
            <div id="dashboard" class="menu active">
                <div class="header">Game Control</div>
                <div class="grid">
				
                    <!-- GAME SETTINGS -->
					
                    <div class="card">
                        <h3>Game Settings</h3>
                        <form id="gameForm">
                            <div class="stepperRow">
								<label>Colors</label>
								
								<div class="stepper">
									<button type="button" onclick="step('colors',-1)">−</button>
									<span id="colorsVal">3</span>
									<input type="hidden" name="colors" id="colors" value="3">
									<button type="button" onclick="step('colors',1)">+</button>
								</div>
							</div>
							<div class="stepperRow">
								<label>Duration</label>

								<div class="stepper">
									<button type="button" onclick="step('time',-5)">−</button>
									<span id="timeVal">30</span>
									<input type="hidden" name="time" id="time" value="30">
									<button type="button" onclick="step('time',5)">+</button>
								</div>
							</div>
                            <div>
                                <label>Brightness:</label>
                                <input type="range" id="bright" min="1" max="255" value="40">
                                (<span id="bVal">40</span>)
                            </div>                            
                        </form>                        
                    </div>
					
					<!-- GAME CONTROLS -->
					
					<div class="card">
						<h3>Game Controls</h3>
						<button onclick="startGame()">Start Game</button>
						
						<button class="danger" onclick="stopGame()">Stop</button>
						<button onclick="restartGame()">Restart</button>
					</div>
					
                    <!-- SYSTEM STATUS -->
					
                    <div class="card">
                        <h3>Status</h3>
                        <div class="statusRow">
                            <span>Running</span>
                            <span id="run">no</span>
                        </div>
                        <div class="statusRow">
                            <span>Holder</span>
                            <span id="holder">-</span>
                        </div>
                        <div class="statusRow">
                            <span>Passes</span>
                            <span id="count">0</span>
                        </div>
                        <div class="statusRow">
                            <span>Time</span>
                            <span><span id="timeLeft">0</span> s</span>
                        </div>
                    </div>
                </div>
            </div>
			
            <!-- TEST MENU -->
			
            <div id="testing" class="menu">
                <div class="header">Torch Testing</div>
                <div class="card">
                    <div id="tests"></div>
                </div>				
            </div>
			<!-- TORCH STATUS MENU -->
			<div id="status" class="menu">
				<div class="header">Torch Status</div>
				<div class="card">
					<div id="players"></div>
				</div>
			</div>
        </div>
		
		<!-- GAME OVER MODAL -->
		
		<div id="gameOverModal" class="modal">
			<div class="modalCard">
				<h2>🔥 Game Finished</h2>
				<p>Total Passes</p>
				<div id="passResult" class="bigNumber">0</div>

				<button onclick="closeModal()">OK</button>
			</div>
		</div>
		
		<script src="/app.js"></script>
		
    </body>
</html>
